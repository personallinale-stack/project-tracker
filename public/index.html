<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متابعة تقدم الفريق</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a0f2e;
  --bg2:#231541;
  --bg3:#2d1a52;
  --bg4:#3a2260;
  --border:#4a2f7a;
  --border2:#6b3fa0;
  --text:#f0e8ff;
  --text2:#c4a8f0;
  --text3:#8b6bb5;
  --blue:#a855f7;
  --blue-bg:#3b1a6e;
  --green:#a3e635;
  --green-bg:#1a3300;
  --yellow:#fbbf24;
  --yellow-bg:#3d2000;
  --red:#f87171;
  --red-bg:#3d0a0a;
  --purple:#d8b4fe;
  --purple-bg:#4c1d95;
  --teal:#67e8f9;
  --teal-bg:#0c2a30;
  --accent:#c084fc;
  --accent2:#e879f9;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:linear-gradient(135deg,#2d1a52 0%,#1a0f2e 100%);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10;
  box-shadow:0 2px 20px rgba(168,85,247,0.15);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-title{font-size:16px;font-weight:600;color:var(--purple);letter-spacing:.3px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#666;transition:background .3s;flex-shrink:0}
.sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.syncing{background:var(--yellow);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:12px;color:var(--text2)}

.deadline-box{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 14px;
}
.deadline-label{font-size:12px;color:var(--text2)}
.deadline-dates{display:flex;gap:8px;align-items:center}
.deadline-dates input[type=date]{
  font-size:12px;border:1px solid var(--border2);border-radius:6px;
  padding:4px 8px;background:var(--bg4);color:var(--text);
  width:130px;outline:none;cursor:pointer;
}
.deadline-dates input[type=date]:focus{border-color:var(--accent)}
.deadline-sep{font-size:12px;color:var(--text3)}

/* MAIN */
.main{padding:24px;max-width:1200px;margin:0 auto}

.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;padding:7px 14px;border-radius:8px;
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit;
}
.btn:hover{background:var(--bg4);border-color:var(--accent)}
.btn-primary{background:var(--blue-bg);border-color:var(--accent);color:var(--purple)}
.btn-primary:hover{opacity:.85}
.online-count{font-size:12px;color:var(--text2);margin-right:auto;display:flex;align-items:center;gap:6px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}

.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:16px;
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{border-color:var(--border2);box-shadow:0 0 20px rgba(168,85,247,0.1)}

.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;flex-shrink:0;
}
.name-wrap{flex:1;min-width:0}
.card-name{
  font-size:14px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;padding:2px 0;border-bottom:1px solid transparent;
  transition:border-color .15s;
}
.card-name:hover{border-color:var(--border2)}
.name-input{
  font-size:14px;font-weight:500;width:100%;
  border:none;border-bottom:1px solid var(--accent);
  background:transparent;color:var(--text);outline:none;padding:2px 0;
  font-family:inherit;
}
.card-pct{font-size:12px;font-weight:500;color:var(--text2);flex-shrink:0}

.cuts-header{
  font-size:11px;color:var(--text3);margin-bottom:8px;
  display:flex;justify-content:space-between;text-transform:uppercase;
  letter-spacing:.5px;
}
.cut-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}

.cut-num{
  width:30px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;border-radius:5px;
  background:var(--bg4);color:var(--text2);flex-shrink:0;cursor:pointer;
  border:1px solid transparent;transition:all .15s;
}
.cut-num:hover{border-color:var(--accent);color:var(--accent)}
.cut-num-input{
  width:30px;height:22px;font-size:12px;font-weight:600;text-align:center;
  border:1px solid var(--accent);border-radius:5px;padding:0;
  background:var(--bg3);color:var(--text);outline:none;flex-shrink:0;
  font-family:inherit;
}
.bar-wrap{flex:1;position:relative}
.bar-track{
  height:8px;background:var(--bg4);border-radius:4px;
  overflow:hidden;cursor:pointer;
}
.bar-fill{height:100%;border-radius:4px;transition:width .25s,background .25s}

.pct-input{
  width:38px;font-size:12px;text-align:center;
  border:1px solid var(--border2);border-radius:5px;padding:2px 3px;
  background:var(--bg4);color:var(--text);outline:none;flex-shrink:0;
  font-family:inherit;
}
.pct-input:focus{border-color:var(--accent)}

.cut-check{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}

.cut-del{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;
  border-radius:4px;flex-shrink:0;opacity:0;transition:opacity .15s;
}
.cut-row:hover .cut-del{opacity:1}
.cut-del:hover{background:var(--red-bg);color:var(--red)}

.cut-add-btn{
  font-size:12px;color:var(--accent);background:none;border:none;
  cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;
  margin-top:4px;font-family:inherit;opacity:.8;
}
.cut-add-btn:hover{opacity:1}

/* COMMENTS */
.comments-section{
  margin-top:12px;padding-top:10px;
  border-top:1px solid var(--border);
}
.comments-header{
  font-size:11px;color:var(--text3);margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  text-transform:uppercase;letter-spacing:.5px;cursor:pointer;
  user-select:none;
}
.comments-header:hover{color:var(--text2)}
.comments-toggle-icon{transition:transform .2s;font-size:12px}
.comments-list{margin-bottom:8px}
.comment-item{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;margin-bottom:6px;
  font-size:12px;color:var(--text2);position:relative;
}
.comment-meta{
  font-size:10px;color:var(--text3);margin-top:4px;
  display:flex;justify-content:space-between;align-items:center;
}
.comment-del{
  background:none;border:none;cursor:pointer;
  color:var(--text3);font-size:11px;padding:0;
  opacity:0;transition:opacity .15s;
}
.comment-item:hover .comment-del{opacity:1}
.comment-del:hover{color:var(--red)}
.comment-input-row{display:flex;gap:6px;align-items:center}
.comment-input{
  flex:1;font-size:12px;padding:6px 10px;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--bg3);color:var(--text);outline:none;
  font-family:inherit;transition:border-color .15s;
  resize:none;min-height:32px;
}
.comment-input:focus{border-color:var(--accent)}
.comment-input::placeholder{color:var(--text3)}
.comment-send-btn{
  background:var(--blue-bg);border:1px solid var(--accent);
  color:var(--purple);border-radius:8px;padding:6px 10px;
  font-size:12px;cursor:pointer;flex-shrink:0;
  transition:opacity .15s;font-family:inherit;
}
.comment-send-btn:hover{opacity:.8}

.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-prog{background:var(--yellow-bg);color:var(--yellow)}
.badge-none{background:var(--bg4);color:var(--text3)}

.del-member-btn{
  font-size:11px;color:var(--text3);background:none;border:none;
  cursor:pointer;padding:0;display:flex;align-items:center;gap:3px;
  font-family:inherit;transition:color .15s;
}
.del-member-btn:hover{color:var(--red)}

.add-card{
  border:1px dashed var(--border);background:transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;font-size:13px;color:var(--text3);cursor:pointer;
  min-height:180px;border-radius:12px;transition:all .15s;
}
.add-card:hover{background:var(--bg2);border-color:var(--accent);color:var(--text2)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:10px 20px;font-size:13px;color:var(--text);
  transition:transform .3s;z-index:100;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* STAR BURST CANVAS */
#starCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:999;
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="topbar">
  <div class="topbar-left">
    <div class="sync-dot" id="syncDot"></div>
    <span class="app-title">✦ متابعة تقدم الفريق</span>
    <span class="sync-label" id="syncLabel">جاري الاتصال...</span>
  </div>
  <div class="deadline-box">
    <i class="ti ti-calendar" style="color:var(--accent);font-size:15px"></i>
    <span class="deadline-label">Deadline</span>
    <div class="deadline-dates">
      <input type="date" id="dlFrom" onchange="updateDeadline()"/>
      <span class="deadline-sep">→</span>
      <input type="date" id="dlTo" onchange="updateDeadline()"/>
    </div>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <span class="online-count" id="onlineCount"></span>
    <button class="btn btn-primary" onclick="addMember()">
      <i class="ti ti-user-plus"></i> أضف موظف
    </button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS=[
  {bg:'#2a1a5e',text:'#a5b4fc'},
  {bg:'#134e4a',text:'#5eead4'},
  {bg:'#3d1a00',text:'#fcd34d'},
  {bg:'#3b0764',text:'#d8b4fe'},
  {bg:'#3d0a0a',text:'#fca5a5'},
  {bg:'#14532d',text:'#86efac'},
  {bg:'#1e1a5e',text:'#c4b5fd'},
  {bg:'#2d1b00',text:'#fbbf24'},
];

let state={deadline:{from:'',to:''},members:[],nextId:10};
let editingName=null;
let editingCutNum={id:null,i:null};
let collapsedComments={};
let ws=null;
let reconnectTimer=null;
let isSyncing=false;

// ─── Stars ───────────────────────────────────────────────
const canvas=document.getElementById('starCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

const STAR_COLORS=['#f472b6','#c084fc','#818cf8','#34d399','#fbbf24','#f87171','#67e8f9','#a3e635','#fb923c'];
let particles=[];

function spawnStars(x,y){
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed - 2,
      life:1,
      decay:0.012+Math.random()*0.015,
      size:3+Math.random()*6,
      color:STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)],
      type:Math.random()<0.5?'star':'circle',
      rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.2,
    });
  }
  animateStars();
}

let animId=null;
function animateStars(){
  if(animId)cancelAnimationFrame(animId);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12;
    p.life-=p.decay; p.rotation+=p.rotSpeed;
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rotation);
    ctx.fillStyle=p.color;
    if(p.type==='star'){
      drawStar(ctx,0,0,5,p.size,p.size/2);
    } else {
      ctx.beginPath();
      ctx.arc(0,0,p.size/2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
  if(particles.length>0) animId=requestAnimationFrame(animateStars);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

function drawStar(ctx,cx,cy,spikes,outerR,innerR){
  let rot=Math.PI/2*3;
  const step=Math.PI/spikes;
  ctx.beginPath();
  ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);
    rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);
    rot+=step;
  }
  ctx.lineTo(cx,cy-outerR);
  ctx.closePath();
  ctx.fill();
}

// ─── WebSocket ───────────────────────────────────────────
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{setSyncStatus('connected');clearTimeout(reconnectTimer);};
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='init'||msg.type==='update'){
      state=msg.state;
      if(!state.members) state.members=[];
      state.members.forEach(m=>{if(!m.comments)m.comments=[];});
      render();
      if(msg.type==='update') showToast('تم التحديث من موظف آخر');
    }
  };
  ws.onclose=()=>{setSyncStatus('disconnected');reconnectTimer=setTimeout(connect,3000);};
  ws.onerror=()=>ws.close();
}

function pushState(){
  if(ws&&ws.readyState===WebSocket.OPEN){
    isSyncing=true;setSyncStatus('syncing');
    ws.send(JSON.stringify({type:'update',state}));
    setTimeout(()=>{isSyncing=false;setSyncStatus('connected');},400);
  }
}

function setSyncStatus(s){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  dot.className='sync-dot';
  if(s==='connected'){dot.classList.add('connected');lbl.textContent='متصل — التحديثات فورية';}
  else if(s==='syncing'){dot.classList.add('syncing');lbl.textContent='جاري المزامنة...';}
  else{lbl.textContent='غير متصل — إعادة الاتصال...';}
}

// ─── Render ──────────────────────────────────────────────
function barColor(pct,done){
  if(done||pct>=100)return'#a3e635';
  if(pct>50)return'#fbbf24';
  if(pct>0)return'#a855f7';
  return'#3a2260';
}
function badge(m){
  const t=m.cuts.length,d=m.cuts.filter(c=>c.done).length;
  if(!t)return`<span class="badge badge-none">لا يوجد كتات</span>`;
  if(d===t)return`<span class="badge badge-done"><i class="ti ti-check"></i> مكتمل ${d}/${t}</span>`;
  if(d)return`<span class="badge badge-prog">جاري ${d}/${t}</span>`;
  return`<span class="badge badge-none">0/${t}</span>`;
}
function totalPct(m){
  if(!m.cuts.length)return 0;
  return Math.round(m.cuts.reduce((a,c)=>a+(c.done?100:c.pct),0)/m.cuts.length);
}
function initials(n){return n.trim().slice(0,2)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtTime(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('ar-SA',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}

function render(){
  const grid=document.getElementById('grid');
  const scrollY=window.scrollY;
  grid.innerHTML='';

  const dlFrom=document.getElementById('dlFrom');
  const dlTo=document.getElementById('dlTo');
  if(document.activeElement!==dlFrom) dlFrom.value=state.deadline.from||'';
  if(document.activeElement!==dlTo) dlTo.value=state.deadline.to||'';

  state.members.forEach(m=>{
    if(!m.comments)m.comments=[];
    const card=document.createElement('div');
    card.className='card';
    const col=COLORS[m.color%COLORS.length];
    const tp=totalPct(m);
    const isCollapsed=collapsedComments[m.id]!==false; // default collapsed

    const nameHtml=editingName===m.id
      ?`<input class="name-input" id="ni-${m.id}" value="${esc(m.name)}" maxlength="20"/>`
      :`<span class="card-name" ondblclick="startEditName(${m.id})" title="انقر مزدوج للتعديل">${esc(m.name)}</span>`;

    const cutsHtml=m.cuts.map((c,i)=>{
      const isEditing=editingCutNum.id===m.id&&editingCutNum.i===i;
      const numEl=isEditing
        ?`<input class="cut-num-input" id="cni-${m.id}-${i}" type="number" min="1" max="999" value="${c.num}"/>`
        :`<span class="cut-num" onclick="startEditCutNum(${m.id},${i})" title="انقر لتعديل الرقم">${c.num}</span>`;
      return`<div class="cut-row">
        ${numEl}
        <div class="bar-wrap">
          <div class="bar-track" onclick="cyclePct(${m.id},${i})">
            <div class="bar-fill" style="width:${c.done?100:c.pct}%;background:${barColor(c.pct,c.done)}"></div>
          </div>
        </div>
        <input class="pct-input" type="number" min="0" max="100" value="${c.done?100:c.pct}" onchange="setPct(${m.id},${i},this.value)"/>
        <input type="checkbox" class="cut-check" ${c.done?'checked':''} onchange="toggleDone(${m.id},${i},this.checked)"/>
        <button class="cut-del" onclick="removeCut(${m.id},${i})"><i class="ti ti-x"></i></button>
      </div>`;
    }).join('');

    const commentsHtml=m.comments.map((c,ci)=>`
      <div class="comment-item">
        <div>${esc(c.text)}</div>
        <div class="comment-meta">
          <span>${fmtTime(c.ts)}</span>
          <button class="comment-del" onclick="deleteComment(${m.id},${ci})"><i class="ti ti-x"></i> حذف</button>
        </div>
      </div>`).join('');

    const commentCount=m.comments.length;
    const commentLabel=commentCount>0?`ملاحظات (${commentCount})`:'ملاحظات';

    card.innerHTML=`
      <div class="card-header">
        <div class="avatar" style="background:${col.bg};color:${col.text}">${initials(m.name)}</div>
        <div class="name-wrap">${nameHtml}</div>
        <span class="card-pct">${tp}%</span>
      </div>
      <div class="cuts-header"><span>Cuts</span><span>${m.cuts.length}</span></div>
      ${cutsHtml}
      <button class="cut-add-btn" onclick="addCut(${m.id})"><i class="ti ti-plus"></i> أضف كت</button>

      <div class="comments-section">
        <div class="comments-header" onclick="toggleComments(${m.id})">
          <span><i class="ti ti-message-circle" style="font-size:12px;margin-left:4px"></i>${commentLabel}</span>
          <span class="comments-toggle-icon" style="transform:rotate(${isCollapsed?'0':'180deg'})"><i class="ti ti-chevron-down"></i></span>
        </div>
        <div id="comments-body-${m.id}" style="display:${isCollapsed?'none':'block'}">
          <div class="comments-list">${commentsHtml}</div>
          <div class="comment-input-row">
            <input class="comment-input" id="ci-${m.id}" type="text" placeholder="اكتب ملاحظة..." maxlength="200"
              onkeydown="if(event.key==='Enter')addComment(${m.id})"/>
            <button class="comment-send-btn" onclick="addComment(${m.id})"><i class="ti ti-send"></i></button>
          </div>
        </div>
      </div>

      <div class="card-footer">
        ${badge(m)}
        <button class="del-member-btn" onclick="removeMember(${m.id})"><i class="ti ti-trash"></i> احذف</button>
      </div>`;

    grid.appendChild(card);

    if(editingName===m.id){
      const inp=document.getElementById(`ni-${m.id}`);
      if(inp){inp.focus();inp.select();
        inp.onblur=()=>commitName(m.id,inp.value);
        inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){editingName=null;render();}};
      }
    }
    if(editingCutNum.id===m.id&&editingCutNum.i!=null){
      const i=editingCutNum.i;
      const inp=document.getElementById(`cni-${m.id}-${i}`);
      if(inp){inp.focus();inp.select();
        inp.onblur=()=>commitCutNum(m.id,i,inp.value);
        inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){editingCutNum={id:null,i:null};render();}};
      }
    }
  });

  const addCard=document.createElement('div');
  addCard.className='add-card';
  addCard.innerHTML=`<i class="ti ti-user-plus" style="font-size:24px;color:var(--accent)"></i><span>أضف موظف</span>`;
  addCard.onclick=addMember;
  grid.appendChild(addCard);

  window.scrollTo(0,scrollY);
}

// ─── Comments ─────────────────────────────────────────────
function toggleComments(id){
  collapsedComments[id]=collapsedComments[id]===false?true:false;
  const body=document.getElementById(`comments-body-${id}`);
  const header=body?.previousElementSibling;
  if(!body)return;
  const collapsed=collapsedComments[id]!==false;
  body.style.display=collapsed?'none':'block';
  const icon=header?.querySelector('.comments-toggle-icon');
  if(icon)icon.style.transform=`rotate(${collapsed?'0':'180deg'})`;
}

function addComment(id){
  const inp=document.getElementById(`ci-${id}`);
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  const m=state.members.find(x=>x.id===id);
  if(!m)return;
  if(!m.comments)m.comments=[];
  m.comments.push({text,ts:Date.now()});
  inp.value='';
  // Keep open
  collapsedComments[id]=false;
  render();pushState();
  // Refocus
  setTimeout(()=>{const ni=document.getElementById(`ci-${id}`);if(ni)ni.focus();},50);
}

function deleteComment(id,ci){
  const m=state.members.find(x=>x.id===id);
  if(m&&m.comments)m.comments.splice(ci,1);
  render();pushState();
}

// ─── Actions ─────────────────────────────────────────────
function updateDeadline(){
  state.deadline.from=document.getElementById('dlFrom').value;
  state.deadline.to=document.getElementById('dlTo').value;
  pushState();
}
function startEditName(id){editingName=id;render();}
function commitName(id,val){
  const m=state.members.find(x=>x.id===id);
  if(m&&val.trim())m.name=val.trim();
  editingName=null;render();pushState();
}
function addMember(){
  state.members.push({id:state.nextId++,name:'موظف جديد',color:state.members.length,cuts:[{num:1,done:false,pct:0}],comments:[]});
  editingName=state.members[state.members.length-1].id;
  render();pushState();
}
function removeMember(id){
  if(!confirm('تأكيد حذف الموظف؟'))return;
  state.members=state.members.filter(m=>m.id!==id);
  render();pushState();
}
function addCut(id){
  const m=state.members.find(x=>x.id===id);
  if(m){const nums=m.cuts.map(c=>c.num);m.cuts.push({num:nums.length?Math.max(...nums)+1:1,done:false,pct:0});}
  render();pushState();
}
function removeCut(id,i){
  const m=state.members.find(x=>x.id===id);if(m)m.cuts.splice(i,1);
  render();pushState();
}
function startEditCutNum(id,i){editingCutNum={id,i};render();}
function commitCutNum(id,i,val){
  const m=state.members.find(x=>x.id===id);
  const v=parseInt(val);if(m&&v>0)m.cuts[i].num=v;
  editingCutNum={id:null,i:null};render();pushState();
}
function setPct(id,i,val){
  const m=state.members.find(x=>x.id===id);if(!m)return;
  const v=Math.min(100,Math.max(0,parseInt(val)||0));
  const wasDone=m.cuts[i].done;
  m.cuts[i].pct=v;m.cuts[i].done=v===100;
  if(!wasDone&&v===100) triggerStars();
  render();pushState();
}
function cyclePct(id,i){
  const m=state.members.find(x=>x.id===id);if(!m||m.cuts[i].done)return;
  const steps=[0,25,50,75,100];
  const idx=steps.findIndex(s=>s===m.cuts[i].pct);
  const next=steps[(idx+1)%steps.length];
  const wasDone=m.cuts[i].done;
  m.cuts[i].pct=next;if(next===100)m.cuts[i].done=true;
  if(!wasDone&&next===100) triggerStars();
  render();pushState();
}
function toggleDone(id,i,val){
  const m=state.members.find(x=>x.id===id);
  if(m){
    const wasDone=m.cuts[i].done;
    m.cuts[i].done=val;m.cuts[i].pct=val?100:0;
    if(!wasDone&&val) triggerStars();
  }
  render();pushState();
}

function triggerStars(){
  // Burst from center of screen
  spawnStars(
    canvas.width/2 + (Math.random()-0.5)*200,
    canvas.height/2 + (Math.random()-0.5)*100
  );
}

// ─── Toast ───────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

connect();
</script>
